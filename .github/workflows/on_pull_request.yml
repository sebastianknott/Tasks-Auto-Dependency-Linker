on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  check-labels:
    name: Validate PR Labels
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check PR has version bump label
        uses: ./.github/actions/check-pr-labels
  
  ci:
    name: Run CI
    runs-on: ubuntu-latest
    needs: check-labels
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      
      - name: Run checks
        run: npm run check
